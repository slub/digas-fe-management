<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">
  <f:spaceless>
    <f:format.raw><f:translate extensionName="DigasFeManagement" key="kitodoAccessGrantedNotification.email.accessGranted" languageKey="{languageKey}" /></f:format.raw>
    <f:format.raw
      ><f:for each="{documentsList}" as="accessGrantedEntry">
        <f:if condition="!{accessGrantedEntry.rejected}"
          >- {accessGrantedEntry.recordId} - {accessGrantedEntry.documentTitle} - - <f:translate extensionName="DigasFeManagement" key="access.list.endtime" languageKey="{languageKey}" />: {accessGrantedEntry.endTime -> f:format.date(format:'%d.%m.%Y')}</f:if
        >
      </f:for></f:format.raw
    >
    <f:format.raw><f:translate extensionName="DigasFeManagement" key="kitodoAccessGrantedNotification.email.accessRejected" languageKey="{languageKey}" /></f:format.raw>
    <f:format.raw
      ><f:for each="{documentsList}" as="accessGrantedEntry"
        ><f:if condition="{accessGrantedEntry.rejected}"
          >- {accessGrantedEntry.recordId} - {accessGrantedEntry.documentTitle}<f:if condition="{accessGrantedEntry.rejectedReason}"
            ><f:translate key="LLL:EXT:digas_fe_management/Resources/Private/Language/locallang_db.xlf:tx_digasfemanagement_domain_model_access.rejected_reason" languageKey="{languageKey}" /> * <f:format.raw>{accessGrantedEntry.rejectedReason}</f:format.raw> *
          </f:if>
        </f:if>
      </f:for>
    </f:format.raw>
    <f:format.raw><f:translate extensionName="DigasFeManagement" key="kitodoAccessGrantedNotification.email.messageLogin" languageKey="{languageKey}" /></f:format.raw>
    {loginUrl} ---

    <f:format.raw><f:translate key="emailNoReplyNotifyText" extensionName="DigasFeManagement" languageKey="{languageKey}" /></f:format.raw>
  </f:spaceless>
</html>
