<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">
  <div style="max-width: 600px; margin: 0 auto; font-family: Arial, sans-serif">
    <h2 style="color: #519651; margin-bottom: 20px">
      <f:translate key="passwordRecovery.email.heading" extensionName="digas_fe_management" />
    </h2>

    <p>
      <f:translate key="passwordRecovery.email.greeting" extensionName="digas_fe_management" arguments="{0: receiverName}" />
    </p>

    <p>
      <f:translate key="passwordRecovery.email.intro" extensionName="digas_fe_management" />
    </p>

    <p><f:link.external uri="{url}">{url}</f:link.external></p>

    <p>
      <f:translate key="passwordRecovery.email.validUntil" extensionName="digas_fe_management" arguments="{0: validUntil}" />
    </p>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd" />

    <p>
      <f:translate key="passwordRecovery.email.notRequested" extensionName="digas_fe_management" />
    </p>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd" />

    <p style="font-size: 12px; color: #666">
      <f:translate key="emailNoReplyNotifyText" extensionName="digas_fe_management" />
    </p>
  </div>
</html>
